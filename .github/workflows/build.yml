name: Build JWS3399 RK3399 OpenWrt

on:
  workflow_dispatch:  # 手动触发

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: 清理环境（彻底解决权限）
        run: |
          sudo rm -rf /usr/share/dotnet /usr/share/mono /usr/lib/android-sdk /opt/hostedtoolcache/Python* /opt/hostedtoolcache/Node*
          sudo df -h

      - name: 拉取 OpenWrt 源码 (P3TERX 稳定版)
        uses: actions/checkout@v4.2.2
        with:
          # 使用 P3TERX 的 ImmortalWrt 镜像，比官方更稳
          repository: p3terx/immortalwrt
          ref: openwrt-23.05
          fetch-depth: 1

      - name: 修复权限
        run: |
          chown -R $USER:$USER .
          chmod -R 755 ./

      - name: 安装依赖
        run: |
          sudo apt update -y
          sudo apt install -y build-essential clang flex gawk gcc-multilib g++-multilib bzip2 python3 libssl-dev git wget curl unzip

      - name: 更新 Feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 配置 JWS3399 驱动
        run: |
          cat > .config << EOF
          CONFIG_TARGET_rockchip=y
          CONFIG_TARGET_rockchip_armv8=y
          CONFIG_TARGET_MULTI_PROFILE=y
          CONFIG_DEVEL=y
          CONFIG_BUILD_PATENTED=y

          # 硬件驱动
          CONFIG_PACKAGE_kmod-libphy=y
          CONFIG_PACKAGE_kmod-mdio-gpio=y
          CONFIG_PACKAGE_kmod-switch-dev=y
          CONFIG_PACKAGE_kmod-mac80211=y
          CONFIG_PACKAGE_kmod-cfg80211=y
          CONFIG_PACKAGE_kmod-drm=y
          CONFIG_PACKAGE_kmod-drm-rockchip=y
          CONFIG_PACKAGE_kmod-mmc=y
          CONFIG_PACKAGE_kmod-sdhci=y
          CONFIG_PACKAGE_kmod-usb2=y
          CONFIG_PACKAGE_kmod-usb3=y
          CONFIG_PACKAGE_kmod-usb-storage=y

          # 完整固件
          CONFIG_TARGET_ROOTFS_SQUASHFS=y
          CONFIG_TARGET_ROOTFS_EXT4FS=n
          EOF
          make defconfig

      - name: 植入 DTB
        run: |
          mkdir -p target/linux/rockchip/dts/rk3399
          cp jws3399.dtb target/linux/rockchip/dts/rk3399/

      - name: 下载依赖
        run: make -j4 download

      - name: 编译
        run: make -j2 V=s

      - name: 上传
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-jws3399-p3terx
          path: bin/targets/rockchip/armv8/
          retention-days: 30
