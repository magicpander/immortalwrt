name: Build JWS3399 RK3399 OpenWrt

on:
  workflow_dispatch:  # 手动触发

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    # 核心修复：强制禁用不安全的 Node.js 版本，强制使用最新稳定版
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: false
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 清理环境 + 拉取代码（终极修复版）
        uses: actions/checkout@v4.2.2  # 指定绝对稳定版本
        with:
          ref: openwrt-23.05
          fetch-depth: 1
          # 增加深度，避免 Git 浅克隆失败
          submodules: 'false'

      - name: 修复目录权限（必须）
        run: |
          sudo chown -R root:root .
          sudo rm -rf ./tmp/* || true

      - name: 安装系统依赖
        run: |
          sudo apt update -y
          sudo apt install -y build-essential clang flex gawk gcc-multilib g++-multilib \
            bzip2 python3 libssl-dev git wget curl unzip

      - name: 更新 Feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 配置 JWS3399 完整功能
        run: |
          cat > .config << EOF
          CONFIG_TARGET_rockchip=y
          CONFIG_TARGET_rockchip_armv8=y
          CONFIG_TARGET_MULTI_PROFILE=y
          CONFIG_DEVEL=y
          CONFIG_BUILD_PATENTED=y

          # 硬件驱动全开启
          CONFIG_PACKAGE_kmod-libphy=y
          CONFIG_PACKAGE_kmod-mdio-gpio=y
          CONFIG_PACKAGE_kmod-switch-dev=y
          CONFIG_PACKAGE_kmod-mac80211=y
          CONFIG_PACKAGE_kmod-cfg80211=y
          CONFIG_PACKAGE_kmod-drm=y
          CONFIG_PACKAGE_kmod-drm-rockchip=y
          CONFIG_PACKAGE_kmod-mmc=y
          CONFIG_PACKAGE_kmod-sdhci=y
          CONFIG_PACKAGE_kmod-usb2=y
          CONFIG_PACKAGE_kmod-usb3=y
          CONFIG_PACKAGE_kmod-usb-storage=y

          # 完整固件配置
          CONFIG_TARGET_ROOTFS_SQUASHFS=y
          CONFIG_TARGET_ROOTFS_EXT4FS=n
          EOF
          make defconfig

      - name: 植入设备树文件
        run: |
          mkdir -p target/linux/rockchip/dts/rk3399
          cp jws3399.dtb target/linux/rockchip/dts/rk3399/ || true

      - name: 下载编译依赖
        run: make -j4 download

      - name: 开始编译
        run: make -j2 V=s

      - name: 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-jws3399-final
          path: bin/targets/rockchip/armv8/
          retention-days: 30
